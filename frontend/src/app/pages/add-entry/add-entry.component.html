<div class="page-container">
  <div class="form-card">

    <h2 class="title">رصد الألفاظ</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- Main word -->
      <section>
        <h3>الكلمة وصيغها</h3>
        <label for="entry_id">الكلمة مكتوبة بالعربية</label>
        <input required id="entry_id" type="text" formControlName="entry_id" placeholder="مثال: {{exampleEntry.entry_id}}" />
        <ng-container formArrayName="forms" class="array-group"> 
          <div *ngFor="let ctrl of formsArray.controls; let i = index" class="input-group flex-field">
            <input id="form-{{i}}" type="text" [formControlName]="i" placeholder="{{exampleEntry.forms[i]? 'مثال: ' + exampleEntry.forms[i] : ''}}" />
            <button type="button" class="delete-btn" (click)="removeForm(i)">🗑️</button>
          </div>
        </ng-container>
        <button type="button" class="add-btn" (click)="addForm()">➕ زيادة الصيغ</button>
      </section>

      <hr />

      <!-- Word origin -->
      <section>
        <h3>أصل الكلمة</h3>
        <label>اللغة التي دخلت منها الكلمة</label>
        <select required formControlName="originSelect">
          <option value="" disabled>اختر اللغة</option>
          <option *ngFor="let language of originOptions" [value]="language">
            {{ language }}
          </option>
        </select>
        <input required *ngIf="showOtherOriginInputField" formControlName="origin"  id="origin" type="text" placeholder="مثال: {{exampleEntry.origin}}" />
        <label for="original">الكلمة في لغتها <small>(إن عُرفت)</small></label>
        <input id="original" type="text" formControlName="original" placeholder="مثال: {{exampleEntry.original}}" />
      </section>

      <hr />

      <!-- Meanings -->
      <section>
        <h3>المعاني المقابلة للكلمة في العربية <small>(إن وُجدت)</small></h3>
        <ng-container formArrayName="meanings" class="array-group">
          <div *ngFor="let ctrl of meaningsArray.controls; let i = index" class="input-group flex-field">
            <input id="meaning-{{i}}" type="text" [formControlName]="i" placeholder="{{exampleEntry.meanings[i]? 'مثال: ' + exampleEntry.meanings[i] : ''}}" />
            <button type="button" class="delete-btn" (click)="removeMeaning(i)">🗑️</button>
          </div>
        </ng-container>
        <button type="button" class="add-btn" (click)="addMeaning()">➕ زيادة المعاني</button>
      </section>

      <hr />

      <!-- Examples -->
      <section>
        <h3>أمثلة وسياقات وشواهد <small>(إن وُجدت)</small></h3>
        <ng-container formArrayName="examples" class="array-group">
          <div *ngFor="let ctrl of examplesArray.controls; let i = index" class="input-group flex-field">
            <input id="example-{{i}}" type="text" [formControlName]="i" placeholder="{{exampleEntry.examples[i]? 'مثال: ' + exampleEntry.examples[i] : ''}}" />
            <button type="button" class="delete-btn" (click)="removeExample(i)">🗑️</button>
          </div>
        </ng-container>
        <button type="button" class="add-btn" (click)="addExample()">➕ زيادة السياقات</button>
      </section>

      <hr />

      <!-- References -->
      <section>
        <h3>الكتب والمراجع <small>(إن وُجدت)</small></h3>
        <ng-container formArrayName="references" class="array-group">
          <div *ngFor="let ctrl of referencesArray.controls; let i = index" class="input-group flex-field">
            <input id="reference-{{i}}" type="text" [formControlName]="i" placeholder="{{exampleEntry.sources[i]? 'مثال: ' + exampleEntry.sources[i] : ''}}" />
            <button type="button" class="delete-btn" (click)="removeReference(i)">🗑️</button>
          </div>
        </ng-container>
        <button type="button" class="add-btn" (click)="addReference()">➕ زيادة المراجع</button>
      </section>

      <!-- Submit -->
      <button type="submit" class="submit-btn full-width" [disabled]="form.invalid">رصد اللفظة</button>

    </form>
  </div>
</div>
